name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'vite.config.ts'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deployment directory
        run: |
          # Extract base path from vite.config.ts (removes leading/trailing slashes)
          BASE_PATH=$(grep -oP "base:\s*['\"]\/?\K[^'\"\/]+" vite.config.ts | sed 's/\/$//')

          # Create deployment structure
          mkdir -p "deploy/${BASE_PATH}"

          # Copy static site files to deploy root
          cp index-static.html deploy/index.html
          cp cutting-board-designer.html cutting-board-tests.html prime.html deploy/ 2>/dev/null || true
          cp *.pdf deploy/ 2>/dev/null || true
          cp -r css deploy/ 2>/dev/null || true
          cp -r img deploy/ 2>/dev/null || true
          cp -r js deploy/ 2>/dev/null || true
          cp CNAME deploy/ 2>/dev/null || true

          # Copy Vite build to subdirectory based on base path
          cp -r dist/* "deploy/${BASE_PATH}/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: false
